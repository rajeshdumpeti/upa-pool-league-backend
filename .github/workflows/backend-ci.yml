name: Backend CI

on:
  pull_request:
    branches: [dev, test, prod]
    paths:
      - "app/**"
      - "migrations/**"
      - "requirements.txt"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports: ["5432:5432"]
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: upa_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Run tests
        env:
        PYTHONPATH:
          ${{github.workspace}}

          # UPA_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/upa_test
          # UPA_APP_ENV: test
          # UPA_JWT_SECRET: test-secret
        run: python -m pytest -q
